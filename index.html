<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chinese Bridge Quiz</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>汉语桥 Quiz</h1>
      <button id="shuffle-toggle" onclick="toggleShuffle()">Shuffle: ON</button>

      <div id="question-box">
        <p id="question">Question loads here</p>
      </div>

      <div id="answers"></div>

      <p id="feedback"></p>

      <p id="score">Score: 0</p>
      <button onclick="restartQuiz()">Restart</button>
    </div>

    <script src="questions.js"></script>
    <script src="script.js"></script>
  </body>
</html>
